<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>골든벨 — 참여자</title>
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
    --border: rgba(255,255,255,0.08); --text: #f0f0f5; --muted: #888899;
    --gold: #f5c842; --gold-dim: rgba(245,200,66,0.12);
    --green: #4cde80; --green-dim: rgba(76,222,128,0.15);
    --red: #f05a5a; --red-dim: rgba(240,90,90,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard','Noto Sans KR',sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .wrap { width: 100%; max-width: 440px; }
  .logo { text-align: center; margin-bottom: 20px; }
  .logo-icon { font-size: 34px; display: block; margin-bottom: 4px; }
  .logo-text { font-size: 20px; font-weight: 800; color: var(--gold); }
  .logo-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
  .screen { display: none; }
  .screen.active { display: block; }
  .btn { display: flex; align-items: center; justify-content: center; padding: 14px; border-radius: 10px; border: none; cursor: pointer; font-size: 15px; font-weight: 700; font-family: inherit; width: 100%; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-gold { background: var(--gold); color: #0f0f13; }
  input { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; color: var(--text); font-size: 16px; font-family: inherit; outline: none; width: 100%; margin-bottom: 12px; }
  input:focus { border-color: var(--gold); }

  /* 입장 */
  #screen-join { padding: 24px; }
  #screen-join h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  #screen-join p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

  /* 대기 */
  #screen-wait { padding: 36px 24px; text-align: center; }
  .wait-icon { font-size: 48px; margin-bottom: 14px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .nickname-badge { display: inline-block; background: var(--gold-dim); color: var(--gold); font-size: 13px; font-weight: 700; padding: 5px 14px; border-radius: 20px; margin-bottom: 14px; }
  .wait-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .wait-sub { font-size: 13px; color: var(--muted); line-height: 1.7; }

  /* 게임 */
  #screen-game { padding: 0; }
  .q-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
  .q-meta { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .q-text { font-size: 15px; font-weight: 700; line-height: 1.6; word-break: keep-all; }
  .options-list { display: flex; flex-direction: column; gap: 8px; padding: 14px 16px; }
  .option-btn { display: flex; align-items: flex-start; gap: 12px; padding: 13px 14px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; text-align: left; transition: all 0.15s; font-family: inherit; color: var(--text); width: 100%; }
  .option-btn:active { transform: scale(0.98); }
  .option-btn.selected { border-color: var(--gold); background: var(--gold-dim); }
  .option-btn:disabled { cursor: not-allowed; opacity: 0.55; }
  .option-label { font-size: 13px; font-weight: 800; color: var(--gold); min-width: 18px; margin-top: 1px; flex-shrink: 0; }
  .option-text { font-size: 13px; font-weight: 500; line-height: 1.55; }
  .submit-area { padding: 4px 16px 18px; }
  .submit-info { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }

  /* 제출 완료 */
  #screen-submitted { padding: 36px 24px; text-align: center; }
  .submitted-icon { font-size: 48px; margin-bottom: 12px; }
  .submitted-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .submitted-answer { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .submitted-mine { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 16px; padding: 10px 14px; background: var(--gold-dim); border-radius: 10px; }
  .waiting-label { font-size: 12px; color: var(--muted); animation: pulse 2s infinite; }

  /* 결과 */
  #screen-result { padding: 20px; }
  .result-box { border-radius: 14px; padding: 26px 20px; text-align: center; }
  .result-box.correct { background: var(--green-dim); border: 2px solid var(--green); }
  .result-box.wrong { background: var(--red-dim); border: 2px solid var(--red); }
  .result-icon { font-size: 52px; margin-bottom: 10px; }
  .result-label { font-size: 26px; font-weight: 800; margin-bottom: 14px; }
  .result-label.correct { color: var(--green); }
  .result-label.wrong { color: var(--red); }
  .result-divider { height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 12px; }
  .result-answer-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .result-answer { font-size: 15px; font-weight: 700; line-height: 1.5; margin-bottom: 8px; }
  .result-answer.correct { color: var(--green); }
  .result-answer.wrong { color: var(--red); }
  .result-mine { font-size: 12px; color: var(--muted); }
  .next-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 14px; animation: pulse 2s infinite; }

  /* 탈락 */
  #screen-eliminated { padding: 36px 24px; text-align: center; }
  .elim-icon { font-size: 64px; margin-bottom: 16px; }
  .elim-title { font-size: 26px; font-weight: 800; color: var(--red); margin-bottom: 10px; }
  .elim-sub { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
  .elim-cheer { font-size: 13px; color: var(--muted); padding: 12px 16px; background: var(--surface2); border-radius: 10px; }

  /* 우승 */
  #screen-winner { padding: 36px 24px; text-align: center; }
  .winner-icon { font-size: 72px; margin-bottom: 14px; animation: bounce 0.7s infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
  .winner-title { font-size: 28px; font-weight: 800; color: var(--gold); margin-bottom: 10px; }
  .winner-sub { font-size: 14px; color: var(--muted); line-height: 1.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <span class="logo-icon">🔔</span>
    <div class="logo-text">도전! 골든벨</div>
    <div class="logo-sub" id="logo-room">연결 중...</div>
  </div>

  <div class="card screen active" id="screen-join">
    <h2>닉네임을 입력하세요</h2>
    <p>강의실 화면에 표시될 이름이에요</p>
    <input id="nickname-input" type="text" placeholder="예: 김민준" maxlength="8" autofocus />
    <button class="btn btn-gold" id="btn-join">입장하기 →</button>
  </div>

  <div class="card screen" id="screen-wait">
    <div class="wait-icon">⏳</div>
    <div class="nickname-badge" id="wait-badge"></div>
    <div class="wait-title">강사님을 기다리는 중...</div>
    <div class="wait-sub">골든벨이 시작되면<br>자동으로 문제가 나타나요!</div>
  </div>

  <div class="card screen" id="screen-game">
    <div class="q-header">
      <div class="q-meta" id="q-meta">문제 1</div>
      <div class="q-text" id="q-text"></div>
    </div>
    <div class="options-list" id="options-list"></div>
    <div class="submit-area">
      <button class="btn btn-gold" id="btn-submit" disabled>보기를 선택해주세요</button>
      <div class="submit-info">제출 후 수정할 수 없어요</div>
    </div>
  </div>

  <div class="card screen" id="screen-submitted">
    <div class="submitted-icon">✋</div>
    <div class="submitted-title">제출 완료!</div>
    <div class="submitted-answer">내가 선택한 답</div>
    <div class="submitted-mine" id="my-answer-display"></div>
    <div class="waiting-label">강사님의 정답 공개를 기다리는 중...</div>
  </div>

  <div class="card screen" id="screen-result">
    <div class="result-box" id="result-box">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-label" id="result-label"></div>
      <div class="result-divider"></div>
      <div class="result-answer-label">정답</div>
      <div class="result-answer" id="result-answer"></div>
      <div class="result-mine" id="result-mine"></div>
    </div>
    <div class="next-hint" id="next-hint"></div>
  </div>

  <div class="card screen" id="screen-eliminated">
    <div class="elim-icon">😢</div>
    <div class="elim-title">탈락!</div>
    <div class="elim-sub">아쉽지만 이번 문제에서 탈락했어요.<br>남은 문제도 응원해주세요!</div>
    <div class="elim-cheer">💪 다음 교육에서 다시 도전해봐요!</div>
  </div>

  <div class="card screen" id="screen-winner">
    <div class="winner-icon">🏆</div>
    <div class="winner-title">최후의 생존자!</div>
    <div class="winner-sub" id="winner-msg"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzyUacMwMro5Aa3hOaKyCoa7wtl8RoWr0",
  authDomain: "goldenbell-bc803.firebaseapp.com",
  databaseURL: "https://goldenbell-bc803-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "goldenbell-bc803",
  storageBucket: "goldenbell-bc803.firebasestorage.app",
  messagingSenderId: "339402292",
  appId: "1:339402292:web:647c1c10b41f8b537cb461"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const params = new URLSearchParams(location.search);
const ROOM = params.get('room') || 'BELL01';
document.getElementById('logo-room').textContent = `룸 코드: ${ROOM}`;

let myPid = null;
let myNickname = '';
let myAnswer = '';
let currentScreen = 'screen-join';
let lastQIndex = -1;
let isEliminated = false;
const LABELS = ['A','B','C','D'];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen = id;
}

document.getElementById('btn-join').addEventListener('click', async () => {
  const nick = document.getElementById('nickname-input').value.trim();
  if (!nick) return;
  myNickname = nick;
  const pRef = push(ref(db, `rooms/${ROOM}/participants`));
  myPid = pRef.key;
  await set(pRef, { nickname: nick, status: 'waiting', answer: '', joinedAt: Date.now() });
  document.getElementById('wait-badge').textContent = `👋 ${nick}님 환영해요!`;
  showScreen('screen-wait');
  startListeners();
});

window.selectOption = (idx, text) => {
  if (!myAnswer || myAnswer !== text) {
    myAnswer = text;
    document.querySelectorAll('.option-btn').forEach((btn, i) => btn.classList.toggle('selected', i === idx));
    const sb = document.getElementById('btn-submit');
    sb.disabled = false;
    sb.textContent = `${LABELS[idx]} 선택 완료 — 제출하기`;
  }
};

document.getElementById('btn-submit').addEventListener('click', async () => {
  if (!myAnswer) return;
  document.getElementById('btn-submit').disabled = true;
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  await update(ref(db, `rooms/${ROOM}/participants/${myPid}`), { answer: myAnswer, status: 'answered' });
  document.getElementById('my-answer-display').textContent = myAnswer;
  showScreen('screen-submitted');
});

function renderQuestion(q, qIndex, total) {
  document.getElementById('q-meta').textContent = `문제 ${qIndex + 1} / ${total}`;
  document.getElementById('q-text').textContent = q.q;
  myAnswer = '';
  const sb = document.getElementById('btn-submit');
  sb.disabled = true;
  sb.textContent = '보기를 선택해주세요';
  const ol = document.getElementById('options-list');
  ol.innerHTML = (q.options || []).map((opt, i) => `
    <button class="option-btn" onclick="selectOption(${i}, ${JSON.stringify(opt)})">
      <span class="option-label">${LABELS[i]}</span>
      <span class="option-text">${opt}</span>
    </button>`).join('');
  showScreen('screen-game');
}

function startListeners() {
  onValue(ref(db, `rooms/${ROOM}/state`), async snap => {
    if (!myPid || !snap.exists() || isEliminated) return;
    const state = snap.val();
    if (state.status === 'idle') { if (currentScreen !== 'screen-join') showScreen('screen-wait'); return; }
    if (state.status !== 'playing') return;

    const qSnap = await get(ref(db, `rooms/${ROOM}/questions`));
    const qArr = [];
    if (qSnap.exists()) qSnap.forEach(c => qArr.push({ id: c.key, ...c.val() }));
    const q = qArr[state.currentQ];
    if (!q) return;

    if (state.currentQ !== lastQIndex) {
      lastQIndex = state.currentQ;
      myAnswer = '';
      renderQuestion(q, state.currentQ, qArr.length);
    }

    if (state.answerVisible && currentScreen !== 'screen-result') {
      const pSnap = await get(ref(db, `rooms/${ROOM}/participants/${myPid}`));
      const me = pSnap.exists() ? pSnap.val() : null;
      const myAns = me?.answer || '';
      const isCorrect = myAns === q.a;
      const box = document.getElementById('result-box');
      box.className = `result-box ${isCorrect ? 'correct' : 'wrong'}`;
      document.getElementById('result-icon').textContent = isCorrect ? '✅' : '❌';
      document.getElementById('result-label').textContent = isCorrect ? '정답!' : '오답...';
      document.getElementById('result-label').className = `result-label ${isCorrect ? 'correct' : 'wrong'}`;
      document.getElementById('result-answer').textContent = q.a;
      document.getElementById('result-answer').className = `result-answer ${isCorrect ? 'correct' : 'wrong'}`;
      document.getElementById('result-mine').textContent = `내 답: ${myAns || '(미제출)'}`;
      document.getElementById('next-hint').textContent = isCorrect ? '✔ 생존! 다음 문제를 기다려주세요' : '✖ 다음 문제로 넘어가면 탈락 처리돼요';
      showScreen('screen-result');
    }
  });

  onValue(ref(db, `rooms/${ROOM}/participants`), snap => {
    if (!myPid || !snap.exists()) return;
    const all = {};
    snap.forEach(c => { all[c.key] = c.val(); });
    const me = all[myPid];
    if (!me) return;

    if (me.status === 'eliminated') {
      isEliminated = true;
      showScreen('screen-eliminated');
      return;
    }

    const allArr = Object.values(all);
    const alive = allArr.filter(p => p.status !== 'eliminated');
    if (alive.length === 1 && allArr.length > 1 && all[myPid]?.status !== 'eliminated') {
      document.getElementById('winner-msg').textContent = `축하합니다, ${myNickname}님! 🎉\n끝까지 살아남으셨어요!`;
      showScreen('screen-winner');
    }
  });
}
</script>
</body>
</html>
