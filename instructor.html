<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>골든벨 — 강사 패널</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --muted: #888899;
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.12);
    --green: #4cde80;
    --green-dim: rgba(76,222,128,0.12);
    --red: #f05a5a;
    --red-dim: rgba(240,90,90,0.12);
    --blue: #5b9cf6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Noto Sans KR', sans-serif; min-height: 100vh; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .logo { font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: -0.03em; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .badge-live { background: var(--green-dim); color: var(--green); }
  .badge-idle { background: rgba(255,255,255,0.06); color: var(--muted); }
  .badge-waiting { background: var(--gold-dim); color: var(--gold); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
  .main { display: grid; grid-template-columns: 380px 1fr; gap: 0; height: calc(100vh - 53px); }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .content { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .num-gold { color: var(--gold); }
  .num-green { color: var(--green); }
  .num-red { color: var(--red); }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; transition: opacity 0.15s, transform 0.1s; }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-gold { background: var(--gold); color: #0f0f13; }
  .btn-green { background: var(--green); color: #0f0f13; }
  .btn-red { background: var(--red); color: white; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 6px; }
  .control-row { display: flex; gap: 8px; }
  .q-form { display: flex; flex-direction: column; gap: 8px; }
  .q-form input, .q-form textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; width: 100%; }
  .q-form input:focus, .q-form textarea:focus { border-color: var(--gold); }
  .q-form textarea { resize: vertical; min-height: 72px; }
  .q-form label { font-size: 11px; color: var(--muted); }
  .q-list { display: flex; flex-direction: column; gap: 6px; }
  .q-item { display: flex; align-items: flex-start; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; transition: border-color 0.15s; }
  .q-item.current { border-color: var(--gold); }
  .q-item.done { opacity: 0.45; }
  .q-idx { font-size: 13px; font-weight: 700; color: var(--gold); min-width: 22px; }
  .q-body { flex: 1; min-width: 0; }
  .q-text { font-size: 13px; font-weight: 500; margin-bottom: 3px; word-break: keep-all; }
  .q-ans { font-size: 11px; color: var(--muted); }
  .q-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 2px 4px; border-radius: 4px; }
  .icon-btn:hover { color: var(--text); background: var(--border); }
  .current-q-display { background: var(--gold-dim); border: 1px solid rgba(245,200,66,0.3); border-radius: 12px; padding: 16px; }
  .current-q-label { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .current-q-text { font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 12px; }
  .answer-reveal { background: var(--green-dim); border: 1px solid rgba(76,222,128,0.25); border-radius: 8px; padding: 10px 14px; margin-top: 8px; }
  .answer-reveal-label { font-size: 10px; color: var(--green); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .answer-reveal-text { font-size: 18px; font-weight: 700; color: var(--green); margin-top: 2px; }
  .participants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
  .p-card { border-radius: 8px; padding: 10px 8px; text-align: center; border: 1px solid var(--border); background: var(--surface2); }
  .p-card.alive { border-color: rgba(76,222,128,0.3); background: var(--green-dim); }
  .p-card.eliminated { opacity: 0.35; background: var(--red-dim); border-color: rgba(240,90,90,0.2); }
  .p-card.correct { border-color: rgba(76,222,128,0.6); background: var(--green-dim); }
  .p-card.wrong { border-color: rgba(240,90,90,0.4); background: var(--red-dim); }
  .p-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; margin: 0 auto 6px; }
  .p-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-status { font-size: 10px; margin-top: 2px; }
  .qr-section { text-align: center; }
  .qr-box { background: white; border-radius: 10px; padding: 12px; display: inline-block; margin-bottom: 8px; }
  .qr-box img { display: block; }
  .room-code { font-size: 28px; font-weight: 800; letter-spacing: 0.15em; color: var(--gold); margin-bottom: 4px; }
  .room-url { font-size: 11px; color: var(--muted); font-family: monospace; word-break: break-all; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .divider { height: 1px; background: var(--border); margin: 4px 0; }
  .no-q { font-size: 13px; color: var(--muted); text-align: center; padding: 20px; }
  .winner-banner { background: linear-gradient(135deg, var(--gold-dim), rgba(245,200,66,0.05)); border: 2px solid var(--gold); border-radius: 12px; padding: 20px; text-align: center; }
  .winner-title { font-size: 13px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .winner-name { font-size: 32px; font-weight: 800; color: var(--gold); }
</style>
</head>
<body>

<!-- ── FIREBASE CONFIG (여기만 수정하세요) ── -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzyUacMwMro5Aa3hOaKyCoa7wtl8RoWr0",
  authDomain: "goldenbell-bc803.firebaseapp.com",
  databaseURL: "https://goldenbell-bc803-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "goldenbell-bc803",
  storageBucket: "goldenbell-bc803.firebasestorage.app",
  messagingSenderId: "339402292",
  appId: "1:339402292:web:647c1c10b41f8b537cb461"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 상태 ──
let gameState = { status: 'idle', currentQ: -1, answerVisible: false, roomCode: 'BELL01' };
let questions = [];
let participants = {};

const ROOM = gameState.roomCode;

// ── Firebase 리스너 ──
onValue(ref(db, `rooms/${ROOM}/state`), snap => {
  if (snap.exists()) { gameState = { ...gameState, ...snap.val() }; renderAll(); }
});
const PRESET_QUESTIONS = [
  { q: "이번 시스템 개편을 통해 기존 센드버드 기반 시스템에서 어떤 시스템으로 전환되나요?", a: "여기어때 자체 구축 채팅 시스템" },
  { q: "로그인 고객이 챗봇 단계에서 상담사 연결 전에 자동으로 확인할 수 있는 정보는 무엇인가요?", a: "고객 정보 및 최근 이용 내역" },
  { q: "예약 내역 조회 시 적용되는 '조회 범위' 정책으로 옳은 것은 무엇인가요?", a: "기간 제한 없이 과거 모든 예약 내역 호출" },
  { q: "국내/해외숙소 카테고리의 예약 내역 1차 정렬 로직 순서로 올바른 것은?", a: "이용 전 > 이용 후 > 취소" },
  { q: "앱(App)에서 상담하던 고객이 웹(Web)으로 환경을 전환했을 때의 제약 사항은 무엇인가요?", a: "내역은 노출되나 모든 버튼이 비활성화됨" },
  { q: "웹(Web) 환경 챗봇에서 예약 취소가 불가능하여 상담사 연결로 대응해야 하는 카테고리가 아닌 것은?", a: "국내 숙소" },
  { q: "채팅 상담이 확정 종료된 이후에도 고객이 계속해서 이용할 수 있는 기능은 무엇인가요?", a: "숙소 정보 및 정책 확인하기" },
  { q: "챗봇 및 채팅 상담 데이터의 최대 보관 기간은 얼마입니까?", a: "3년" },
  { q: "예약 내역 리스트에서 '페이징 방식'에 대한 설명으로 옳은 것은?", a: "최초 10개 로드 후 스크롤 시 10개씩 추가 로드" },
  { q: "사용자가 직접 삭제한 예약 내역은 챗봇 리스트에 어떻게 처리되나요?", a: "리스트 노출에서 제외됨" },
  { q: "세일즈포스(Salesforce)와 여기어때 자체 채팅 시스템 간의 상태 연동 방식에 대한 설명으로 옳은 것은 무엇입니까?", a: "세일즈포스에서 [대기(채팅)]를 선택하면 채팅 시스템도 자동으로 [상담 가능] 상태가 된다" },
  { q: "로그인한 고객이 본인의 예약 내역에 대해 문의할 때, 새 시스템에서 적용되는 본인 확인 정책은 무엇입니까?", a: "로그인 상태를 인증 완료로 간주하여 별도의 본인확인 단계를 생략할 수 있다" },
  { q: "채팅 상담 중 '30분 무응답 자동 종료'가 실행되기 위한 필수 조건이 아닌 것은 무엇입니까?", a: "고객이 30분 동안 한 번이라도 메시지를 읽지 않은 상태(안읽음)여야 한다" },
  { q: "상담사가 다른 상담사에게 상담 소유권을 '이관'했을 때 발생하는 시스템 변화로 옳은 것은?", a: "이관 완료 즉시 기존 담당자는 메시지 작성 권한이 사라지고 '읽기 전용'이 된다" },
  { q: "상담사에게 새로운 채팅 문의가 배정되는 우선순위 로직 중 1순위 기준은 무엇입니까?", a: "현재 진행 중인 상담(InProgress) 건수가 가장 적은 상담사" },
  { q: "제휴점(숙소) 계정으로 로그인한 사용자가 본인 숙소에 대해 문의할 때의 간소화된 확인 프로세스는?", a: "상담 중인 담당자의 명칭(성함/직함)만 확인하는 것으로 본인 확인을 대체한다" },
  { q: "고객이 App에서 상담을 받다가 Web 환경으로 전환(스위칭)했을 때 발생하는 현상은 무엇입니까?", a: "상담 내역은 보이지만 시나리오 챗봇의 모든 버튼이 비활성화(Disabled)된다" },
  { q: "채팅 시스템의 보안 정책 중 '마스킹(Masking)'에 대한 설명으로 틀린 것은?", a: "마스킹이 적용된(별표 노출) 상태에서 텍스트를 복사하면 원문 데이터가 복사된다" },
  { q: "채팅 상태값 중 'Waiting'과 'InProgress'를 구분하는 결정적인 기준은 무엇입니까?", a: "상담사가 고객에게 첫 번째 메시지를 발송했는지 여부" },
  { q: "버튼형 시나리오 챗봇의 흐름에서 '3Depth(세부내용)' 단계에서 수행하는 활동으로 적절한 것은?", a: "특정 예약을 선택한 후 취소, 결제 내역, 리뷰 조회 등을 확인한다" },
];

async function initPresetQuestions() {
  const snap = await get(ref(db, `rooms/${ROOM}/questions`));
  if (!snap.exists()) {
    for (const q of PRESET_QUESTIONS) {
      await push(ref(db, `rooms/${ROOM}/questions`), { ...q, order: Date.now() });
    }
  }
}
initPresetQuestions();

onValue(ref(db, `rooms/${ROOM}/questions`), snap => {
  questions = [];
  if (snap.exists()) snap.forEach(c => questions.push({ id: c.key, ...c.val() }));
  renderQuestions();
  renderCurrentQ();
  document.getElementById('stat-total').textContent = questions.length;
});
onValue(ref(db, `rooms/${ROOM}/participants`), snap => {
  participants = snap.exists() ? snap.val() : {};
  renderParticipants();
  updateStats();
});

// ── 통계 업데이트 ──
function updateStats() {
  const all = Object.values(participants);
  const alive = all.filter(p => p.status !== 'eliminated').length;
  const elim = all.filter(p => p.status === 'eliminated').length;
  document.getElementById('stat-alive').textContent = alive;
  document.getElementById('stat-elim').textContent = elim;
  document.getElementById('stat-total-p').textContent = all.length;
}

// ── QR 코드 생성 ──
function generateQR() {
  const url = `${location.origin}/goldenbell/participant.html?room=${ROOM}`;
  document.getElementById('room-url').textContent = url;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(url)}`;
  document.getElementById('qr-img').src = qrUrl;
}

// ── 문제 추가 ──
window.addQuestion = async () => {
  const q = document.getElementById('new-q').value.trim();
  const a = document.getElementById('new-a').value.trim();
  if (!q || !a) { toast('문제와 정답을 모두 입력해주세요'); return; }
  await push(ref(db, `rooms/${ROOM}/questions`), { q, a, order: Date.now() });
  document.getElementById('new-q').value = '';
  document.getElementById('new-a').value = '';
  toast('문제가 추가되었어요');
};

// ── 문제 삭제 ──
window.deleteQuestion = async (id) => {
  await remove(ref(db, `rooms/${ROOM}/questions/${id}`));
  toast('문제가 삭제되었어요');
};

// ── 골든벨 시작/종료 ──
window.toggleGame = async () => {
  if (gameState.status === 'idle') {
    if (questions.length === 0) { toast('문제를 먼저 추가해주세요!'); return; }
    await set(ref(db, `rooms/${ROOM}/state`), { status: 'playing', currentQ: 0, answerVisible: false });
    toast('골든벨 시작!');
  } else {
    if (!confirm('골든벨을 종료하시겠어요?')) return;
    await set(ref(db, `rooms/${ROOM}/state`), { status: 'idle', currentQ: -1, answerVisible: false });
    toast('골든벨 종료');
  }
};

// ── 다음 문제 ──
window.nextQuestion = async () => {
  const next = gameState.currentQ + 1;
  if (next >= questions.length) { toast('마지막 문제예요!'); return; }
  const updates = {};
  Object.keys(participants).forEach(pid => {
    if (participants[pid].status === 'correct') updates[`rooms/${ROOM}/participants/${pid}/status`] = 'alive';
    if (participants[pid].status === 'wrong') updates[`rooms/${ROOM}/participants/${pid}/status`] = 'eliminated';
  });
  updates[`rooms/${ROOM}/state/currentQ`] = next;
  updates[`rooms/${ROOM}/state/answerVisible`] = false;
  await update(ref(db), updates);
  toast(`${next + 1}번 문제로 이동`);
};

// ── 정답 공개 ──
window.revealAnswer = async () => {
  await update(ref(db, `rooms/${ROOM}/state`), { answerVisible: true });
  toast('정답 공개!');
};

// ── 참여자 탈락 처리 ──
window.eliminateParticipant = async (pid) => {
  await update(ref(db, `rooms/${ROOM}/participants/${pid}`), { status: 'eliminated' });
};

// ── 렌더링 ──
function renderAll() { renderCurrentQ(); renderQuestions(); renderParticipants(); }

function renderCurrentQ() {
  const el = document.getElementById('current-q-section');
  if (gameState.status !== 'playing' || gameState.currentQ < 0 || !questions[gameState.currentQ]) {
    el.innerHTML = '<p style="color:var(--muted);font-size:13px;">게임이 시작되면 현재 문제가 여기에 표시돼요.</p>';
    return;
  }
  const q = questions[gameState.currentQ];
  el.innerHTML = `
    <div class="current-q-display">
      <div class="current-q-label">문제 ${gameState.currentQ + 1} / ${questions.length}</div>
      <div class="current-q-text">${q.q}</div>
      ${gameState.answerVisible ? `
        <div class="answer-reveal">
          <div class="answer-reveal-label">정답</div>
          <div class="answer-reveal-text">${q.a}</div>
        </div>` : ''}
    </div>`;

  document.getElementById('btn-next').disabled = !(!gameState.answerVisible === false);
  document.getElementById('btn-reveal').disabled = gameState.answerVisible;
}

function renderQuestions() {
  const el = document.getElementById('q-list');
  if (questions.length === 0) { el.innerHTML = '<div class="no-q">아직 문제가 없어요</div>'; return; }
  el.innerHTML = questions.map((q, i) => `
    <div class="q-item ${i === gameState.currentQ ? 'current' : ''} ${i < gameState.currentQ ? 'done' : ''}">
      <div class="q-idx">${i + 1}</div>
      <div class="q-body">
        <div class="q-text">${q.q}</div>
        <div class="q-ans">정답: ${q.a}</div>
      </div>
      <div class="q-actions">
        <button class="icon-btn" onclick="deleteQuestion('${q.id}')" title="삭제">✕</button>
      </div>
    </div>`).join('');
}

function avatarColor(name) {
  const colors = ['#f5c842','#4cde80','#5b9cf6','#f05a5a','#c084fc','#fb923c','#22d3ee'];
  let h = 0; for (let c of name) h += c.charCodeAt(0);
  return colors[h % colors.length];
}

function renderParticipants() {
  const el = document.getElementById('p-grid');
  const all = Object.entries(participants);
  if (all.length === 0) { el.innerHTML = '<p style="color:var(--muted);font-size:12px;grid-column:1/-1;">아직 참여자가 없어요. QR을 공유해주세요!</p>'; return; }

  // 최후 1인 체크
  const alive = all.filter(([,p]) => p.status !== 'eliminated');
  if (alive.length === 1 && all.length > 1) {
    document.getElementById('winner-section').innerHTML = `
      <div class="winner-banner">
        <div class="winner-title">🏆 최종 생존자</div>
        <div class="winner-name">${alive[0][1].nickname}</div>
      </div>`;
  } else {
    document.getElementById('winner-section').innerHTML = '';
  }

  el.innerHTML = all.map(([pid, p]) => {
    const statusLabel = { alive: '생존', eliminated: '탈락', correct: '정답', wrong: '오답', waiting: '대기' }[p.status] || p.status;
    const statusColor = { alive: 'var(--green)', eliminated: 'var(--red)', correct: 'var(--green)', wrong: 'var(--red)', waiting: 'var(--muted)' }[p.status] || 'var(--muted)';
    const cls = ['alive','correct'].includes(p.status) ? 'alive' : p.status === 'eliminated' ? 'eliminated' : p.status === 'wrong' ? 'wrong' : '';
    return `
      <div class="p-card ${cls}" title="${p.nickname}">
        <div class="p-avatar" style="background:${avatarColor(p.nickname)}22;color:${avatarColor(p.nickname)}">
          ${p.nickname.charAt(0)}
        </div>
        <div class="p-name">${p.nickname}</div>
        <div class="p-status" style="color:${statusColor}">${statusLabel}</div>
      </div>`;
  }).join('');
}

// ── DOM 연결 ──
document.getElementById('btn-add-q').addEventListener('click', addQuestion);
document.getElementById('btn-toggle').addEventListener('click', toggleGame);
document.getElementById('btn-next').addEventListener('click', nextQuestion);
document.getElementById('btn-reveal').addEventListener('click', revealAnswer);

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

generateQR();
document.getElementById('room-code').textContent = ROOM;
</script>
